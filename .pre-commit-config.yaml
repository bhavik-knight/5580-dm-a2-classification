repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: "stable"
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

# Optional: add other hooks (isort, black, etc.) if desired

